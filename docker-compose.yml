services:
  backend-api:
    build:
      context: ./backend-api
    ports:
      - "3001:3001"
    volumes:
      - ./backend-api:/app
    environment:
      - PORT=3001
  frontend-app:
    build:
      context: ./frontend-app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-app:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:3001
    depends_on:
      - backend-api
  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    depends_on:
      - backend-api
      - frontend-app

volumes:
  jenkins_home: