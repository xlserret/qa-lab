$kind: http-request
name: Health Check
url: "{{baseUrl}}/health"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Service is qa-lab-backend", function () {
          const response = pm.response.json();
          pm.expect(response.service).to.eql("qa-lab-backend");
      });

      pm.test("Status is ok", function () {
          const response = pm.response.json();
          pm.expect(response.status).to.eql("ok");
      });
    language: text/javascript
order: 1780169961937
